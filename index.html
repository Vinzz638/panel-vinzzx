<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VINZZXHOST - PANEL</title>
    <style>
        body { background-color: #000000; color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding: 20px; }
        .container { width: 100%; max-width: 380px; }
        
        /* HEADER */
        .header { text-align: center; margin-bottom: 20px; }
        .logo-circle { 
            width: 85px; height: 85px; border-radius: 50%; 
            border: 2px solid #00ff44; margin: 0 auto 10px;
            box-shadow: 0 0 15px #00ff44; overflow: hidden; background: #222;
        }
        .logo-circle img { width: 100%; height: 100%; object-fit: cover; }
        .brand { font-size: 22px; font-weight: bold; letter-spacing: 2px; }

        /* BUTTONS */
        .btn-outline {
            display: block; width: 100%; padding: 12px; border: 1px solid #00ff44; border-radius: 25px;
            background: rgba(0, 255, 68, 0.05); color: #00ff44; text-decoration: none; font-weight: bold;
            margin-bottom: 25px; text-align: center; box-sizing: border-box; transition: 0.3s;
        }
        .btn-outline:active { transform: scale(0.95); }

        .btn-grad { 
            width: 100%; padding: 12px; border: none; border-radius: 8px; 
            background: linear-gradient(45deg, #00b09b, #96c93d); color: black; font-weight: bold; cursor: pointer;
            transition: 0.3s;
        }
        .btn-grad:active { transform: scale(0.95); }

        .btn-blue { 
            background: linear-gradient(to right, #00d2ff, #3a7bd5); border:none; width:100%; padding:14px; 
            border-radius:10px; color:white; font-weight:bold; cursor:pointer; font-size: 14px; 
            margin-top: 10px; text-decoration: none; display: block; text-align: center; box-sizing: border-box;
            box-shadow: 0 4px 15px rgba(58, 123, 213, 0.4); transition: 0.3s;
        }
        .btn-blue:active { transform: scale(0.95); }

        /* CARDS */
        .card { background: #0a0a0a; border-radius: 15px; padding: 20px; margin-bottom: 20px; border: 1px solid #1a1a1a; }
        .title-section { color: white; font-size: 16px; font-weight: bold; margin-bottom: 15px; display: flex; align-items: center; }
        .title-section::before { content: ""; display: inline-block; width: 4px; height: 20px; background: #00ff44; margin-right: 10px; border-radius: 2px; }

        input { width: 100%; padding: 12px; background: #151515; border: 1px solid #333; color: #00ff44; border-radius: 8px; margin-bottom: 15px; box-sizing: border-box; outline: none; }

        /* TABLE */
        .table-email { width: 100%; border-collapse: collapse; }
        .table-email td { padding: 12px 0; border-top: 1px solid #1a1a1a; font-size: 13px; }

        /* MODAL */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: flex; justify-content: center;
            align-items: center; opacity: 0; visibility: hidden; transition: 0.4s; z-index: 999;
        }
        .modal-overlay.show { opacity: 1; visibility: visible; }
        .modal-content {
            background: white; color: black; padding: 30px; border-radius: 20px;
            text-align: center; width: 260px; transform: scale(0.8); transition: 0.4s;
        }
        .modal-overlay.show .modal-content { transform: scale(1); }
        .success-icon {
            width: 50px; height: 50px; border-radius: 50%; border: 3px solid #00ff44;
            color: #00ff44; font-size: 30px; display: flex; justify-content: center; align-items: center; margin: 0 auto 15px;
        }
        .btn-modal-ok { background: #3a7bd5; color: white; border: none; padding: 10px 40px; border-radius: 8px; font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body>

<div class="modal-overlay" id="notifBerhasil">
    <div class="modal-content">
        <div class="success-icon">✓</div>
        <b>Berhasil!</b>
        <p style="font-size: 13px; color: #666;">Data sudah diperbarui.</p>
        <button class="btn-modal-ok" onclick="tutupNotif()">OK</button>
    </div>
</div>

<div class="container">
    <div class="header">
        <div class="logo-circle"><img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR_iV-I6v1_Gk_0NAn9XvK3p8Z6j9WnC6-uQw&s"></div>
        <div class="brand">VINZZXHOST</div>
    </div>

    <a href="https://wa.me/628818486388" class="btn-outline">🌐 SEWA PANEL KLIK DISINI</a>

    <div class="card">
        <div class="title-section">DATA PANEL</div>
        <input type="text" id="namaResult" value="Results Vip Vinzzz 👽">
        <button class="btn-grad" onclick="updateDataPanel()">UPDATE DATA</button>
    </div>

    <div class="card">
        <div class="title-section">Email Configuration</div>
        <div style="display: flex; gap: 10px;">
            <input type="text" id="inputEmail" placeholder="Target Email..." style="flex: 2;">
            <input type="number" id="inputLimit" placeholder="120" style="flex: 1;">
        </div>
        <button class="btn-grad" onclick="tambahEmail()">ADD EMAIL</button>

        <table class="table-email"><tbody id="listEmail"></tbody></table>
    </div>

    <a href="https://wa.me/628818486388" class="btn-blue">🌐 PUSAT/PANEL ( KLIK DISINI )</a>
</div>

<script>
    function munculNotif() { document.getElementById("notifBerhasil").classList.add("show"); }
    function tutupNotif() { document.getElementById("notifBerhasil").classList.remove("show"); }

    // Load data pas buka web
    window.onload = function() {
        const savedData = localStorage.getItem('vinzzEmails');
        if (savedData) {
            document.getElementById('listEmail').innerHTML = savedData;
        }
    };

    function updateDataPanel() {
        munculNotif();
    }

    function tambahEmail() {
        const email = document.getElementById("inputEmail").value;
        const limit = document.getElementById("inputLimit").value || "0";
        if (!email) return alert("Email kosong bang!");

        const table = document.getElementById("listEmail");
        const row = table.insertRow(0);
        row.innerHTML = `
            <td style="color: #00ff44;">${email}</td>
            <td style="text-align:center;"><span style="background:#1a1a1a; color: #00ff44; padding: 2px 8px; border-radius: 4px;">${limit}</span></td>
            <td style="text-align: right; color: #ff416c; cursor:pointer;" onclick="hapusEmail(this)">🗑️</td>
        `;
        document.getElementById("inputEmail").value = "";
        document.getElementById("inputLimit").value = "";
        localStorage.setItem('vinzzEmails', table.innerHTML); // Simpan
        munculNotif();
    }

    function hapusEmail(btn) {
        if(confirm("Hapus?")) {
            btn.parentElement.parentElement.remove();
            localStorage.setItem('vinzzEmails', document.getElementById('listEmail').innerHTML); // Simpan perubahan setelah hapus
        }
    }
</script>
</body>
</html>
