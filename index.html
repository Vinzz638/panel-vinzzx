<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VINZZXHOST - PANEL</title>
    <style>
        /* CSS DASAR & EFEK SMOOTH */
        body { background-color: #000000; color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding: 20px; transition: all 0.5s ease; }
        .container { width: 100%; max-width: 380px; }
        
        /* LOGO & BRAND */
        .header { text-align: center; margin-bottom: 20px; }
        .logo-circle { 
            width: 85px; height: 85px; border-radius: 50%; 
            border: 2px solid #00ff44; margin: 0 auto 10px;
            box-shadow: 0 0 15px #00ff44; overflow: hidden; background: #222;
        }
        .logo-circle img { width: 100%; height: 100%; object-fit: cover; }
        .brand { font-size: 22px; font-weight: bold; letter-spacing: 2px; text-shadow: 0 0 10px #00ff44; }

        /* TOMBOL WA SMOOTH */
        .btn-outline {
            display: block; width: 100%; padding: 12px;
            border: 1px solid #00ff44; border-radius: 25px;
            background: rgba(0, 255, 68, 0.05);
            color: #00ff44; text-decoration: none; font-weight: bold;
            margin-bottom: 25px; text-align: center; box-sizing: border-box;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-outline:active { transform: scale(0.92); background: rgba(0, 255, 68, 0.2); }

        /* CARD */
        .card { background: #0a0a0a; border-radius: 15px; padding: 20px; margin-bottom: 20px; border: 1px solid #1a1a1a; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .title-section { color: white; font-size: 16px; font-weight: bold; margin-bottom: 15px; display: flex; align-items: center; }
        .title-section::before { content: ""; display: inline-block; width: 4px; height: 20px; background: #00ff44; margin-right: 10px; border-radius: 2px; }

        input { width: 100%; padding: 12px; background: #151515; border: 1px solid #333; color: #00ff44; border-radius: 8px; margin-bottom: 15px; box-sizing: border-box; outline: none; transition: border 0.3s; }
        input:focus { border-color: #00ff44; }

        /* TOMBOL GRADASI */
        .btn-grad { 
            width: 100%; padding: 12px; border: none; border-radius: 8px; 
            background: linear-gradient(45deg, #00b09b, #96c93d); 
            color: black; font-weight: bold; cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-grad:active { transform: scale(0.95); opacity: 0.8; }

        /* TABEL */
        .table-email { width: 100%; margin-top: 10px; border-collapse: collapse; }
        .table-email td { padding: 12px 0; border-top: 1px solid #1a1a1a; font-size: 13px; animation: slideIn 0.4s ease forwards; }
        
        @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }

        /* MODAL NOTIF (SANGAT SMOOTH) */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: flex; justify-content: center;
            align-items: center; opacity: 0; visibility: hidden; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 999;
        }
        .modal-overlay.show { opacity: 1; visibility: visible; }
        .modal-content {
            background: white; color: black; padding: 30px; border-radius: 20px;
            text-align: center; width: 280px; transform: translateY(30px); transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .modal-overlay.show .modal-content { transform: translateY(0); }
        .success-icon {
            width: 50px; height: 50px; border-radius: 50%; border: 3px solid #00ff44;
            color: #00ff44; font-size: 30px; display: flex; justify-content: center;
            align-items: center; margin: 0 auto 15px; font-weight: bold;
        }
        .btn-modal-ok { background: #3a7bd5; color: white; border: none; padding: 10px 40px; border-radius: 8px; font-weight: bold; margin-top: 15px; cursor: pointer; }
    </style>
</head>
<body>

<div class="modal-overlay" id="notifBerhasil">
    <div class="modal-content">
        <div class="success-icon">✓</div>
        <div style="font-size: 18px; font-weight: bold; margin-bottom: 5px;">Berhasil!</div>
        <div style="font-size: 14px; color: #666;">Data telah diperbarui & disimpan.</div>
        <button class="btn-modal-ok" onclick="tutupNotif()">OK</button>
    </div>
</div>

<div class="container">
    <div class="header">
        <div class="logo-circle">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR_iV-I6v1_Gk_0NAn9XvK3p8Z6j9WnC6-uQw&s">
        </div>
        <div class="brand">VINZZXHOST</div>
    </div>

    <a href="https://wa.me/628818486388" class="btn-outline">🌐 SEWA PANEL KLIK DISINI</a>

    <div class="card">
        <div class="title-section">DATA PANEL</div>
        <input type="text" id="namaResult" value="Results Vip Vinzzz 👽">
        <button class="btn-grad" onclick="munculNotif()">UPDATE DATA</button>
    </div>

    <div class="card">
        <div class="title-section">Email Configuration</div>
        <div style="display: flex; gap: 10px;">
            <input type="text" id="inputEmail" placeholder="Target Email..." style="flex: 2;">
            <input type="number" id="inputLimit" placeholder="120" style="flex: 1;">
        </div>
        <button class="btn-grad" onclick="tambahEmail()">ADD EMAIL</button>

        <table class="table-email">
            <tbody id="listEmail">
                </tbody>
        </table>
    </div>
</div>

<script>
    // Fungsi muncul & tutup notif
    function munculNotif() {
        document.getElementById("notifBerhasil").classList.add("show");
    }
    function tutupNotif() {
        document.getElementById("notifBerhasil").classList.remove("show");
    }

    // FUNGSI LOCALSTORAGE (BIAR GAK KERESET)
    window.onload = function() {
        var dataSimpanan = localStorage.getItem('dataEmailVinzz');
        if (dataSimpanan) {
            document.getElementById('listEmail').innerHTML = dataSimpanan;
        }
    };

    function simpanData() {
        var isiTabel = document.getElementById('listEmail').innerHTML;
        localStorage.setItem('dataEmailVinzz', isiTabel);
    }

    function tambahEmail() {
        var email = document.getElementById("inputEmail").value;
        var limit = document.getElementById("inputLimit").value || "0";
        
        if (email == "") { alert("Isi emailnya dulu bang!"); return; }

        var table = document.getElementById("listEmail");
        var row = table.insertRow(0);
        row.innerHTML = `
            <td style="color: #00ff44;">${email}</td>
            <td style="text-align:center;"><span style="background:#1a1a1a; color: #00ff44; padding: 2px 8px; border-radius: 4px; border: 1px solid #333;">${limit}</span></td>
            <td style="text-align: right; color: #ff416c; cursor:pointer; font-size:18px;" onclick="hapusBaris(this)">🗑️</td>
        `;
        
        document.getElementById("inputEmail").value = "";
        document.getElementById("inputLimit").value = "";
        
        simpanData(); // Simpan ke memori HP
        munculNotif(); // Munculin notif berhasil
    }

    function hapusBaris(btn) {
        if(confirm("Hapus email ini bang?")) {
            var row = btn.parentNode.parentNode;
            row.parentNode.removeChild(row);
            simpanData(); // Update memori HP setelah dihapus
        }
    }
</script>

</body>
</html>
