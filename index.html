<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VINZZXHOST - NEON EDITION</title>
    <style>
        body { 
            background-color: #000; 
            color: white; 
            font-family: sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 40px 20px; 
            margin: 0; 
        }

        .logo-v { 
            width: 80px; 
            height: 80px; 
            border-radius: 50%; 
            border: 2px solid #4ade80; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 40px; 
            color: #4ade80; 
            box-shadow: 0 0 20px #4ade80; 
            margin-bottom: 10px; 
            font-weight: bold;
        }

        .brand { 
            letter-spacing: 5px; 
            margin-bottom: 25px; 
            font-size: 22px; 
            font-weight: bold;
            text-transform: uppercase; 
        }

        .btn-sewa { 
            border: 1px solid #4ade80; 
            color: #4ade80; 
            padding: 8px 25px; 
            border-radius: 20px; 
            text-decoration: none; 
            font-size: 11px; 
            margin-bottom: 35px; 
        }

        .card { 
            background: #0d0d0d; 
            border-radius: 15px; 
            padding: 25px; 
            width: 340px; 
            border: 1px solid #1a1a1a; 
            margin-bottom: 20px; 
            box-sizing: border-box; 
        }

        .card-title { 
            color: #4ade80; 
            font-size: 14px; 
            margin-bottom: 20px; 
            border-left: 3px solid #4ade80; 
            padding-left: 10px; 
            font-weight: bold; 
            text-align: left;
        }

        input { 
            width: 100%; 
            background: #161616; 
            border: 1px solid #222; 
            color: #ccc; 
            padding: 14px; 
            margin-bottom: 15px; 
            border-radius: 10px; 
            box-sizing: border-box; 
            outline: none; 
            text-align: left; 
            font-size: 14px;
        }

        /* 🟢 Neon Lime buat Input Atas & Tengah */
        .inp-editable { 
            border: 1px solid #4ade80; 
            color: #4ade80; /* Teks Neon Hijau */
            font-weight: bold;
            box-shadow: 0 0 5px rgba(74, 222, 128, 0.2);
        }

        .inp-readonly { 
            color: #4ade80; /* Teks Neon Hijau */
            font-weight: bold; 
            cursor: not-allowed; 
            border: 1px solid #4ade80; /* Border Neon Hijau */
            background: #0d0d0d;
            box-shadow: 0 0 5px rgba(74, 222, 128, 0.2);
        }

        .btn-update { 
            width: 100%; 
            padding: 15px; 
            background: linear-gradient(to right, #15803d, #4ade80); 
            border: none; 
            border-radius: 10px; 
            color: black; 
            font-weight: bold; 
            cursor: pointer; 
            text-transform: uppercase; 
        }

        .card-config { 
            background: #0d0d0d; 
            border-radius: 15px; 
            padding: 20px; 
            width: 340px; 
            border: 1px solid #1a1a1a; 
            margin-bottom: 20px; 
            box-sizing: border-box; 
        }

        .config-row { display: flex; gap: 10px; }
        .inp-target { 
            flex: 2; 
            border: 1px solid rgba(74, 222, 128, 0.4); /* Neon Hijau Tipis */
            color: #ccc;
        }
        .inp-jml { 
            flex: 1; 
            border: 1px solid rgba(74, 222, 128, 0.4); /* Neon Hijau Tipis */
            color: #ccc;
            text-align: center; 
        }

        .btn-add { 
            width: 100%; 
            padding: 12px; 
            background: #1a1a1a; 
            color: #fff; 
            border: 1px solid #333; 
            border-radius: 8px; 
            font-weight: bold; 
            cursor: pointer; 
        }

        .btn-pusat { 
            width: 340px; 
            padding: 15px; 
            background: linear-gradient(to right, #38bdf8, #2563eb); 
            border: none; 
            border-radius: 10px; 
            color: white; 
            font-weight: bold; 
            text-decoration: none; 
            text-align: center; 
            text-transform: uppercase; 
            font-size: 13px; 
            display: block; 
            box-sizing: border-box; 
            box-shadow: 0 4px 10px rgba(37, 99, 235, 0.2);
        }
    </style>
</head>
<body>

    <div class="logo-v">V</div>
    <div class="brand">VINZZXHOST</div>
    <a href="#" class="btn-sewa">🌐 SEWA PANEL KLIK DISINI</a>

    <div class="card">
        <div class="card-title">DATA PANEL</div>
        
        <input type="text" class="inp-editable" value="Result Own Vinz 💀">
        
        <input type="text" class="inp-readonly" value="vinz0129@gmail.com" readonly>
        
        <button class="btn-update">UPDATE DATA</button>
    </div>

    <div class="card-config">
        <div class="card-title">Email Configuration</div>
        <div class="config-row">
            <input type="text" class="inp-target" placeholder="Target Email...">
            <input type="text" class="inp-jml" placeholder="Jml">
        </div>
        <button class="btn-add">ADD EMAIL</button>
    </div>

    <a href="#" class="btn-pusat">🌐 PUSAT/PANEL ( KLIK DISINI )</a>

</body>
</html>
